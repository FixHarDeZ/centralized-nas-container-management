name: secrets

on:
  pull_request:
    paths:
      - 'secrets/**'
      - 'scripts/render_env.py'
      - 'scripts/diff_envs.py'
      - 'tests/**'
      - 'shared/**'
      - '**/secrets.manifest.yaml'
      - 'deploy.manifest.yaml'
      - '.sops.yaml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops + age
        run: |
          curl -sLo /tmp/sops "https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -sL "https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install pytest pyyaml jsonschema

      - name: Load CI age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Run unit tests
        run: pytest tests/ shared/tests/ -v

      - name: Render test vault and validate manifests
        run: |
          python scripts/render_env.py --check --vault secrets/test-vault.sops.yaml --exclude scripts
