repos:
  # === SECTION 1: GIT & CONFIG HYGIENE ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # === SECTION 2: SECRET SCANNING (BANK GRADE) ===
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.8
    hooks:
      - id: trufflehog
        name: TruffleHog
        entry: trufflehog git file://. --max-depth=1
        language: system
        stages: [pre-commit]

  # === SECTION 3: CODE QUALITY & SECURITY (PYTHON & DOCKER) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker