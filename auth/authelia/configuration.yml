server:
  host: 0.0.0.0
  port: 9091

log:
  level: 'info'

authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

access_control:
  default_policy: 'one_factor'

session:
  name: 'authelia_session'
  expiration: '12h'
  inactivity: '45m'

storage:
  local:
    path: '/data/db.sqlite3'

notifier:
  filesystem:
    filename: '/data/notifications.txt'
