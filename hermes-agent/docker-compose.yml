services:
  hermes-gateway:
    build:
      context: .
      args:
        HERMES_REF: v2026.5.29.2
    image: hermes-agent
    container_name: hermes-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-100}
      - HERMES_HOME=/opt/data
      - TELEGRAM_BOT_TOKEN=${HERMES_TELEGRAM_BOT_TOKEN}
    volumes:
      - hermes_agent_data:/opt/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: ["gateway", "run"]

  hermes-dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - hermes-gateway
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-100}
      - HERMES_HOME=/opt/data
      - TELEGRAM_BOT_TOKEN=${HERMES_TELEGRAM_BOT_TOKEN}
    expose:
      - "9119"
    volumes:
      - hermes_agent_data:/opt/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]

  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "5063:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      - hermes-dashboard

volumes:
  hermes_agent_data:
