# ══════════════════════════════════════════════════════════════════════════════
# Fix's NAS Dashboard — services.yaml
# Synology DS925+
# Secrets are injected via HOMEPAGE_VAR_* environment variables (see .env)
# ══════════════════════════════════════════════════════════════════════════════
# ─── 📥 Downloads & Monitoring ────────────────────────────────────────────────
- 📥 Downloads & Monitoring:
    - TorrentWatch:
        icon: mdi-rss
        href: "{{HOMEPAGE_VAR_DDNS_BASE_HTTPS}}:15059"
        description: Torrent Monitor (bearbit.org)
        ping: "{{HOMEPAGE_VAR_TORRENTWATCH_URL}}"
        widget:
          type: customapi
          url: "{{HOMEPAGE_VAR_TORRENTWATCH_URL}}/api/status"
          refreshInterval: 60000
          mappings:
            - field: scrape_status
              label: Status
              format: text
            - field: last_scrape
              label: Scraped
              format: text
            - field: next_scrape
              label: Next
              format: text
              
    - Download Station:
        icon: synology-download-station.png
        href: "{{HOMEPAGE_VAR_QUICKCONNECT_URL}}/download/"
        description: Synology Download Station
        widget:
          type: downloadstation
          url: "{{HOMEPAGE_VAR_NAS_URL}}"
          username: "{{HOMEPAGE_VAR_NAS_USERNAME}}"
          password: "{{HOMEPAGE_VAR_NAS_PASSWORD}}"
    
    - ink-reader:
        icon: mdi-book-open-page-variant
        href: "{{HOMEPAGE_VAR_DDNS_BASE_HTTPS}}:15068"
        description: Library for E-Reader (OPDS)
        ping: "{{HOMEPAGE_VAR_INK_READER_URL}}"
        widget:
          type: customapi
          url: "{{HOMEPAGE_VAR_INK_READER_URL}}/api/status"
          refreshInterval: 60000
          mappings:
            - field: stats.new.count
              label: New
              format: number
            - field: stats.kept.count
              label: Kept
              format: number
            - field: last_scrape.downloaded
              label: Last Scrape
              format: number

    - Portainer:
        icon: portainer.png
        href: "{{HOMEPAGE_VAR_DDNS_BASE_HTTPS}}:19000"
        description: Container Manager
        widget:
          type: portainer
          url: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
          env: 3
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: "{{HOMEPAGE_VAR_DDNS_BASE_HTTPS}}:13001/dashboard"
        description: Service Health Monitor
        widget:
          type: uptimekuma
          url: "{{HOMEPAGE_VAR_UPTIME_KUMA_URL}}"
          slug: "{{HOMEPAGE_VAR_UPTIME_KUMA_SLUG}}"

    - Watchtower:
        icon: watchtower.png
        href: "#"
        description: Auto Container Updates
        widget:
          type: docker
          server: my-docker
          container: watchtower

    - Log Medic:
        icon: mdi-medical-bag
        href: "{{HOMEPAGE_VAR_DDNS_BASE_HTTPS}}:15070"
        description: Docker Log Monitor + Auto-fix
        ping: "{{HOMEPAGE_VAR_DDNS_BASE_HTTP}}:5070"              

