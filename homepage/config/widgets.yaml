---
# ─── Top Bar Widgets ──────────────────────────────────────────────────────────
# System resource summary
- resources:
    label: System
    cpu: true
    memory: true
    uptime: true
    disk:
      - "{{HOMEPAGE_VAR_VOLUME_STORAGE}}"
      - "{{HOMEPAGE_VAR_VOLUME_ROOT}}"
    cacheInterval: 5000

# Glances GPU stats (NVIDIA via Jellyfin transcoding)
- glances:
    url: http://glances:61208
    version: 4
    metric: gpu:0
    chart: false
    refreshInterval: 5000

# Glances system load (avg + processes)
- glances:
    url: http://glances:61208
    version: 4
    metric: process
    chart: false
    refreshInterval: 5000

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: google
    target: _blank
    focus: false
