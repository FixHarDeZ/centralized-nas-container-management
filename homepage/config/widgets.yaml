---
# ─── Top Bar Widgets ──────────────────────────────────────────────────────────
# System resource summary
- resources:
    label: System
    cpu: true
    memory: true
    uptime: true
    disk:
      - "{{HOMEPAGE_VAR_VOLUME_STORAGE}}"
      - "{{HOMEPAGE_VAR_VOLUME_ROOT}}"
    cacheInterval: 5000

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: google
    target: _blank
    focus: false
