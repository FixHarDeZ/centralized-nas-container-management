version: '3.8'

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    # No host port — access only through the nginx auth proxy below
    expose:
      - "3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro   # สำหรับ Docker widget
      - /volume1:/volume1:ro
    env_file: ../.env
    environment:
      - TZ=Asia/Bangkok

  nginx:
    image: nginx:alpine
    container_name: homepage-nginx
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    env_file: ../.env
    environment:
      - TZ=Asia/Bangkok
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache apache2-utils >/dev/null 2>&1
        htpasswd -bc /etc/nginx/.htpasswd "$$NGINX_BASIC_AUTH_USER" "$$NGINX_BASIC_AUTH_PASS"
        exec nginx -g 'daemon off;'
    depends_on:
      - homepage
