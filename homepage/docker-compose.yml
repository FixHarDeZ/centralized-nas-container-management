version: '3.8'

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    # No host port — access only through the nginx auth proxy below
    expose:
      - "3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro   # สำหรับ Docker widget
      - /volume1:/volume1:ro
    environment:
      - TZ=Asia/Bangkok
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
      # ─── Passed to services.yaml via {{HOMEPAGE_VAR_*}} ──────────────────────
      - HOMEPAGE_VAR_JELLYFIN_URL=${JELLYFIN_URL}
      - HOMEPAGE_VAR_JELLYFIN_KEY=${JELLYFIN_KEY}
      - HOMEPAGE_VAR_PLEX_URL=${PLEX_URL}
      - HOMEPAGE_VAR_PLEX_KEY=${PLEX_KEY}
      - HOMEPAGE_VAR_NAS_URL=${NAS_LOCAL_URL}
      - HOMEPAGE_VAR_NAS_USERNAME=${NAS_USERNAME}
      - HOMEPAGE_VAR_NAS_PASSWORD=${NAS_PASSWORD}
      - HOMEPAGE_VAR_PORTAINER_URL=${PORTAINER_URL}
      - HOMEPAGE_VAR_PORTAINER_KEY=${PORTAINER_KEY}
      - HOMEPAGE_VAR_UPTIME_KUMA_URL=${UPTIME_KUMA_URL}
      - HOMEPAGE_VAR_UPTIME_KUMA_SLUG=${UPTIME_KUMA_SLUG}
      - HOMEPAGE_VAR_QUICKCONNECT_URL=${QUICKCONNECT_URL}
      - HOMEPAGE_VAR_DDNS_BASE=${EXTERNAL_BASE}
      - HOMEPAGE_VAR_MAID_TRACKER_URL=${MAID_TRACKER_URL}

  nginx:
    image: nginx:alpine
    container_name: homepage-nginx
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS}
    # Generate .htpasswd from env vars at startup using openssl (built into nginx:alpine)
    # then hand off to nginx. Using $$ to escape compose variable interpolation.
    command:
      - /bin/sh
      - -c
      - |
        HASH=$$(openssl passwd -apr1 "$$BASIC_AUTH_PASS")
        printf '%s:%s\n' "$$BASIC_AUTH_USER" "$$HASH" > /etc/nginx/.htpasswd
        exec nginx -g 'daemon off;'
    depends_on:
      - homepage
