server {
    listen 80;

    # HTTP Basic Auth — credentials loaded from /etc/nginx/.htpasswd
    # (generated at container startup from BASIC_AUTH_USER / BASIC_AUTH_PASS env vars)
    auth_basic "Homepage";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass          http://homepage:3000;
        proxy_http_version  1.1;

        # Pass original host/IP so Homepage's HOMEPAGE_ALLOWED_HOSTS check still works
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Disable buffering for real-time widgets / SSE streams
        proxy_buffering     off;
    }
}
