<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d13">
<title>ink-reader</title>
<style>
  :root {
    --bg: #0b0d13;
    --surface: #151823;
    --surface-2: #1d2130;
    --border: #262b3d;
    --text: #e8e9ee;
    --text-dim: #8b8fa3;
    --accent: #7c6cf6;
    --accent-soft: rgba(124, 108, 246, 0.16);
    --amber: #f5a524;
    --red: #f45b69;
    --red-soft: rgba(244, 91, 105, 0.14);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.5;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11, 13, 19, 0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem 1rem 0.6rem;
  }
  .header-top { display: flex; align-items: center; gap: 0.6rem; }
  header h1 {
    font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 0.45rem; margin-left: auto; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    display: grid; place-items: center; font-size: 1.05rem;
    background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:active, .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .btn-scrape {
    height: 40px; padding: 0 1rem; border: none; cursor: pointer;
    border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600;
    background: linear-gradient(135deg, #7c6cf6, #5f8bf7); color: #fff;
    transition: filter 0.15s;
  }
  .btn-scrape:hover { filter: brightness(1.12); }
  .btn-scrape:disabled { opacity: 0.55; cursor: default; }

  /* ── Filter pills ── */
  .tabs {
    display: flex; gap: 0.4rem; margin-top: 0.65rem;
    overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 0.45rem 1rem; border-radius: 999px; font-size: 0.82rem;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent-soft); color: var(--accent);
    border-color: var(--accent); font-weight: 600;
  }

  /* ── Stats ── */
  .stats-row {
    display: flex; gap: 0.9rem; margin-top: 0.55rem; flex-wrap: wrap;
    font-size: 0.75rem; color: var(--text-dim);
  }
  .stats-row strong { color: var(--text); font-weight: 600; }

  /* ── Grid / cards ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.9rem; padding: 1rem;
    max-width: 1400px; margin: 0 auto;
  }
  .card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
    border: 1px solid var(--border);
  }
  .card-img-wrap { position: relative; }
  .card img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover;
    background: #0e1018; display: block;
  }
  .badge {
    position: absolute; padding: 0.18rem 0.5rem; border-radius: 999px;
    font-size: 0.66rem; font-weight: 600; color: #fff;
    background: rgba(8, 9, 14, 0.72); backdrop-filter: blur(4px);
  }
  .badge-source { top: 8px; left: 8px; }
  .badge-pages { bottom: 8px; right: 8px; }
  .badge-pages.long { background: rgba(124, 108, 246, 0.85); }
  .card .body {
    padding: 0.6rem 0.65rem 0.65rem;
    display: flex; flex-direction: column; gap: 0.35rem; flex: 1;
  }
  .card .title {
    font-size: 0.82rem; font-weight: 500; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 2.2em;
  }
  .card .sub {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.7rem; color: var(--text-dim);
  }
  .card .exp { color: var(--amber); }
  .card .exp.soon { color: var(--red); font-weight: 600; }
  .actions { display: flex; gap: 0.4rem; margin-top: auto; padding-top: 0.15rem; }
  .actions > * {
    flex: 1; height: 38px; border: none; border-radius: var(--radius-sm);
    font-size: 1rem; cursor: pointer; display: grid; place-items: center;
    text-decoration: none; transition: filter 0.15s;
  }
  .actions > *:hover { filter: brightness(1.25); }
  .dl-btn { background: var(--accent-soft); color: var(--accent); }
  .del { background: var(--red-soft); color: var(--red); }

  .empty {
    grid-column: 1 / -1; text-align: center; padding: 4rem 1rem;
    color: var(--text-dim); font-size: 0.9rem;
  }
  .empty .glyph { font-size: 2.2rem; display: block; margin-bottom: 0.5rem; }

  /* ── Pager ── */
  .pager {
    display: flex; align-items: center; justify-content: center; gap: 0.8rem;
    padding: 0.5rem 1rem 1.5rem; color: var(--text-dim); font-size: 0.85rem;
  }
  .pager button {
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    border-radius: var(--radius-sm); padding: 0.55rem 1.1rem; cursor: pointer;
    font-size: 0.85rem;
  }
  .pager button:disabled { opacity: 0.35; cursor: default; }

  /* ── Settings dialog ── */
  dialog {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    padding: 1.25rem; width: min(92vw, 360px);
  }
  dialog::backdrop { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); }
  dialog h2 { font-size: 1rem; margin-bottom: 1rem; }
  .field { margin-bottom: 0.9rem; }
  .field label {
    display: block; font-size: 0.8rem; color: var(--text-dim);
    margin-bottom: 0.35rem;
  }
  .field input {
    width: 100%; height: 44px; padding: 0 0.75rem; font-size: 1rem;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field .hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; }
  .dialog-actions { display: flex; gap: 0.5rem; margin-top: 1.1rem; }
  .dialog-actions button {
    flex: 1; height: 42px; border-radius: var(--radius-sm); font-size: 0.88rem;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  }
  .btn-cancel { background: transparent; color: var(--text-dim); }
  .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
  #settings-msg { font-size: 0.75rem; color: var(--red); min-height: 1em; margin-top: 0.4rem; }

  /* ── Go-to-top ── */
  #btn-go-top {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: 16px;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    display: grid; place-items: center; font-size: 18px;
    box-shadow: 0 8px 22px -4px rgba(124, 108, 246, 0.5), 0 2px 4px rgba(0,0,0,.3);
    opacity: 0; transform: translateY(12px); pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 200;
  }
  #btn-go-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  @media (max-width: 480px) {
    #grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; padding: 0.75rem; }
    header { padding: 0.55rem 0.75rem 0.55rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>📚 ink<span>-reader</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="btn-settings" title="ตั้งค่า" aria-label="Settings">⚙️</button>
      <button class="icon-btn" id="refresh" title="Refresh" aria-label="Refresh">↻</button>
      <button class="btn-scrape" id="scrape">Scrape</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-f="all">ทั้งหมด</button>
    <button class="tab" data-f="long" id="tab-long">📖 หน้าเยอะ</button>
  </div>
  <div class="stats-row" id="stats"></div>
</header>

<div id="grid"></div>
<div class="pager" id="pager"></div>

<dialog id="settings-dialog">
  <h2>⚙️ ตั้งค่า</h2>
  <form method="dialog" id="settings-form">
    <div class="field">
      <label for="set-retention">เก็บเรื่องใหม่ไว้กี่วัน</label>
      <input id="set-retention" type="number" min="1" max="3650" inputmode="numeric" required>
      <div class="hint">ครบกำหนดแล้วลบไฟล์อัตโนมัติ (มีผลกับเรื่องที่มีอยู่ด้วย)</div>
    </div>
    <div class="field">
      <label for="set-minpages">หน้าเยอะ = ตั้งแต่กี่หน้าขึ้นไป</label>
      <input id="set-minpages" type="number" min="1" max="1000" inputmode="numeric" required>
      <div class="hint">ใช้กับแท็บ "หน้าเยอะ" และหมวด OPDS บนเครื่องอ่าน</div>
    </div>
    <div id="settings-msg"></div>
    <div class="dialog-actions">
      <button type="button" class="btn-cancel" id="settings-cancel">ยกเลิก</button>
      <button type="submit" class="btn-save" id="settings-save">บันทึก</button>
    </div>
  </form>
</dialog>

<button id="btn-go-top" title="กลับขึ้นบน" aria-label="Go to top">↑</button>

<script>
const PAGE_SIZE = 60;
const SOURCE_LABELS = { doujinth: "doujin-th" };

let filter = "all";
let page = 1;
let settings = { retention_days: 30, min_pages: 30 };

const $ = id => document.getElementById(id);

function fmtSize(b) {
  if (!b) return "";
  return b > 1048576 ? (b / 1048576).toFixed(1) + " MB" : (b / 1024 | 0) + " KB";
}

function daysLeft(iso) {
  if (!iso) return null;
  return Math.max(0, Math.ceil((new Date(iso) - Date.now()) / 86400000));
}

function renderStats(stats, sources, last) {
  const n = stats?.new || { count: 0, size: 0 };
  let html = `<span>ทั้งหมด <strong>${n.count}</strong> ${fmtSize(n.size)}</span>`;
  for (const [name, d] of Object.entries(sources || {})) {
    html += `<span>${SOURCE_LABELS[name] || name} <strong>${d.count}</strong></span>`;
  }
  if (last) {
    const t = new Date(last.run_at).toLocaleString("th-TH", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "short" });
    html += `<span>scrape <strong>${t}</strong></span>`;
    if (last.error) html += `<span style="color:var(--red)">⚠ ${last.error}</span>`;
  }
  $("stats").innerHTML = html;
}

async function loadStats() {
  const s = await (await fetch("/api/status")).json();
  renderStats(s.stats, s.sources, s.last_scrape);
}

async function loadSettings() {
  settings = await (await fetch("/api/settings")).json();
  $("tab-long").textContent = `📖 หน้าเยอะ ${settings.min_pages}+`;
}

function cardHTML(t) {
  const dl = daysLeft(t.expires_at);
  const srcLabel = SOURCE_LABELS[t.source] || t.source || "";
  const isLong = (t.pages || 0) >= settings.min_pages;
  return `
    <div class="card-img-wrap">
      <img src="/covers/${t.id}.jpg" loading="lazy" alt="">
      ${srcLabel ? `<span class="badge badge-source">${srcLabel}</span>` : ""}
      <span class="badge badge-pages${isLong ? " long" : ""}">${t.pages} หน้า</span>
    </div>
    <div class="body">
      <div class="title">${t.title}</div>
      <div class="sub">
        <span>${fmtSize(t.file_size)}</span>
        <span class="exp${dl !== null && dl <= 3 ? " soon" : ""}">⏳ ${dl} วัน</span>
      </div>
      <div class="actions">
        <a class="dl-btn" href="/files/${t.id}.cbz" download title="Download CBZ">⬇️</a>
        <button class="del" data-id="${t.id}" title="ลบ">🗑</button>
      </div>
    </div>`;
}

async function load() {
  const data = await (await fetch("/api/titles?status=new")).json();
  let all = data.titles || [];
  if (filter === "long") all = all.filter(t => (t.pages || 0) >= settings.min_pages);

  const grid = $("grid");
  grid.innerHTML = "";
  const totalPages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
  page = Math.min(page, totalPages);
  const titles = all.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  if (!titles.length) {
    grid.innerHTML = '<div class="empty"><span class="glyph">🌙</span>ไม่มีเรื่องในหมวดนี้</div>';
  }
  for (const t of titles) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = cardHTML(t);
    grid.appendChild(card);
  }
  renderPager(totalPages);
  loadStats();
}

function renderPager(totalPages) {
  const pager = $("pager");
  if (totalPages <= 1) { pager.innerHTML = ""; return; }
  pager.innerHTML = `
    <button id="pg-prev" ${page <= 1 ? "disabled" : ""}>← ก่อนหน้า</button>
    <span>หน้า ${page} / ${totalPages}</span>
    <button id="pg-next" ${page >= totalPages ? "disabled" : ""}>ถัดไป →</button>`;
  $("pg-prev")?.addEventListener("click", () => { page--; load(); window.scrollTo({ top: 0 }); });
  $("pg-next")?.addEventListener("click", () => { page++; load(); window.scrollTo({ top: 0 }); });
}

$("grid").addEventListener("click", async (e) => {
  const btn = e.target.closest("button.del");
  if (!btn) return;
  if (!confirm("ลบเรื่องนี้ทิ้งถาวร?")) return;
  await fetch(`/api/titles/${btn.dataset.id}/delete`, { method: "POST" });
  load();
});

document.querySelectorAll(".tab").forEach(b =>
  b.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    filter = b.dataset.f;
    page = 1;
    load();
  })
);

$("scrape").addEventListener("click", async () => {
  const btn = $("scrape");
  btn.textContent = "Scraping…";
  btn.disabled = true;
  await fetch("/api/scrape", { method: "POST" });
  setTimeout(() => { btn.textContent = "Scrape"; btn.disabled = false; load(); }, 3000);
});

$("refresh").addEventListener("click", () => load());

/* ── Settings dialog ── */
$("btn-settings").addEventListener("click", () => {
  $("set-retention").value = settings.retention_days;
  $("set-minpages").value = settings.min_pages;
  $("settings-msg").textContent = "";
  $("settings-dialog").showModal();
});
$("settings-cancel").addEventListener("click", () => $("settings-dialog").close());
$("settings-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const r = await fetch("/api/settings", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      retention_days: +$("set-retention").value,
      min_pages: +$("set-minpages").value,
    }),
  });
  if (!r.ok) {
    $("settings-msg").textContent = (await r.json()).detail || "บันทึกไม่สำเร็จ";
    return;
  }
  settings = await r.json();
  $("tab-long").textContent = `📖 หน้าเยอะ ${settings.min_pages}+`;
  $("settings-dialog").close();
  load();
});

/* ── Go-to-top ── */
(function () {
  const btn = $("btn-go-top");
  window.addEventListener("scroll", () => {
    btn.classList.toggle("visible", window.scrollY > 200);
  }, { passive: true });
  btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
})();

loadSettings().then(load);
</script>
</body>
</html>
