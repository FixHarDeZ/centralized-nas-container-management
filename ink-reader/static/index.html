<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ink-reader</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22263a;
    --border: #2a2e3f;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245, 158, 11, 0.12);
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.5; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15, 17, 23, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.25rem;
  }
  .header-top { display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.1rem; font-weight: 600; white-space: nowrap; }
  .header-actions { display: flex; gap: 0.5rem; margin-left: auto; }

  /* Buttons */
  .btn {
    border: none; border-radius: var(--radius-sm); padding: 0.5rem 1rem;
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #818cf8; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface); color: var(--text); }

  /* Tabs */
  .tabs { display: flex; gap: 0.25rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .tab {
    padding: 0.4rem 0.85rem; border-radius: 999px; font-size: 0.8rem;
    font-weight: 500; cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text-dim); transition: all 0.15s ease;
  }
  .tab:hover { background: var(--surface); color: var(--text); }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Source chips */
  .sources-bar {
    display: flex; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap;
  }
  .source-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.3rem 0.7rem; border-radius: 999px; font-size: 0.75rem;
    background: var(--surface); border: 1px solid var(--border);
  }
  .source-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .source-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .source-dot.idle { background: var(--text-dim); }

  /* Stats row */
  .stats-row {
    display: flex; gap: 0.75rem; margin-top: 0.6rem; flex-wrap: wrap;
  }
  .stat {
    display: flex; align-items: baseline; gap: 0.35rem;
    font-size: 0.78rem; color: var(--text-dim);
  }
  .stat strong { color: var(--text); font-weight: 600; }

  /* Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 1rem; padding: 1.25rem;
  }

  /* Card */
  .card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
    border: 1px solid var(--border);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-img-wrap {
    position: relative; overflow: hidden;
  }
  .card img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover;
    background: #111; display: block;
  }
  .card .source-badge {
    position: absolute; top: 8px; left: 8px;
    padding: 0.15rem 0.45rem; border-radius: 999px;
    font-size: 0.65rem; font-weight: 600;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    color: white;
  }
  .card .body { padding: 0.65rem; display: flex; flex-direction: column; gap: 0.3rem; flex: 1; }
  .card .title {
    font-size: 0.82rem; font-weight: 500; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta { font-size: 0.72rem; color: var(--text-dim); }
  .card .exp { font-size: 0.72rem; color: var(--amber); }
  .card .kept-badge { font-size: 0.72rem; color: var(--green); font-weight: 500; }

  .actions { display: flex; gap: 0.35rem; margin-top: auto; padding-top: 0.3rem; }
  .actions button {
    flex: 1; padding: 0.4rem 0; font-size: 0.9rem; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.15s;
  }
  .actions button:hover { opacity: 0.85; }
  .keep { background: var(--green-dim); color: var(--green); }
  .del { background: rgba(239, 68, 68, 0.12); color: var(--red); }

  /* Empty state */
  .empty {
    grid-column: 1 / -1; text-align: center; padding: 3rem 1rem;
    color: var(--text-dim);
  }
  .empty p { font-size: 0.9rem; }

  /* Responsive */
  @media (max-width: 480px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; padding: 0.75rem; }
    header { padding: 0.6rem 0.75rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>📚 ink-reader</h1>
    <div class="header-actions">
      <button class="btn btn-ghost" id="refresh" title="Refresh">↻</button>
      <button class="btn btn-primary" id="scrape">Scrape</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-f="">ทั้งหมด</button>
    <button class="tab" data-f="new">ใหม่</button>
    <button class="tab" data-f="kept">เก็บแล้ว</button>
  </div>
  <div class="sources-bar" id="sources-bar"></div>
  <div class="stats-row" id="stats"></div>
</header>
<div id="grid"></div>

<script>
let filter = "";

const SOURCE_LABELS = { doujinth: "doujin-th" };

function fmtSize(b) {
  if (!b) return "";
  return b > 1048576 ? (b / 1048576).toFixed(1) + " MB" : (b / 1024 | 0) + " KB";
}

function daysLeft(iso) {
  if (!iso) return null;
  return Math.max(0, Math.ceil((new Date(iso) - Date.now()) / 86400000));
}

function renderSources(sources) {
  const bar = document.getElementById("sources-bar");
  bar.innerHTML = "";
  for (const [name, data] of Object.entries(sources || {})) {
    const chip = document.createElement("span");
    chip.className = "source-chip";
    chip.innerHTML = `<span class="source-dot active"></span>${SOURCE_LABELS[name] || name} <strong>${data.count}</strong>`;
    bar.appendChild(chip);
  }
}

function renderStats(stats, last) {
  const el = document.getElementById("stats");
  const n = stats?.new || { count: 0, size: 0 };
  const k = stats?.kept || { count: 0, size: 0 };
  let html = `<span class="stat">ใหม่ <strong>${n.count}</strong> ${fmtSize(n.size)}</span>`;
  html += `<span class="stat">เก็บ <strong>${k.count}</strong> ${fmtSize(k.size)}</span>`;
  if (last) {
    const ago = new Date(last.run_at).toLocaleString("th-TH", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "short" });
    html += `<span class="stat">scrape <strong>${ago}</strong></span>`;
    if (last.error) html += `<span class="stat" style="color:var(--red)">⚠ ${last.error}</span>`;
  }
  el.innerHTML = html;
}

async function loadStats() {
  const s = await (await fetch("/api/status")).json();
  renderSources(s.sources);
  renderStats(s.stats, s.last_scrape);
}

async function load() {
  let q = "";
  if (filter.startsWith("source:")) {
    q = "?source=" + filter.split(":")[1];
  } else if (filter) {
    q = "?status=" + filter;
  }
  const data = await (await fetch("/api/titles" + q)).json();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const titles = (data.titles || []).filter(t => t.status !== "deleted");
  if (!titles.length) {
    grid.innerHTML = '<div class="empty"><p>No titles found</p></div>';
  }
  for (const t of titles) {
    const card = document.createElement("div");
    card.className = "card";
    const dl = daysLeft(t.expires_at);
    const srcLabel = SOURCE_LABELS[t.source] || t.source || "";
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="/covers/${t.id}.jpg" loading="lazy" alt="">
        ${srcLabel ? `<span class="source-badge">${srcLabel}</span>` : ""}
      </div>
      <div class="body">
        <div class="title">${t.title}</div>
        <div class="meta">${t.pages} หน้า · ${fmtSize(t.file_size)}</div>
        ${t.status === "kept"
          ? `<div class="kept-badge">❤️ เก็บถาวร</div>`
          : `<div class="exp">⏳ เหลือ ${dl} วัน</div>`}
        <div class="actions">
          ${t.status === "new" ? `<button class="keep" data-a="keep" data-id="${t.id}">❤️</button>` : ""}
          <button class="del" data-a="delete" data-id="${t.id}">🗑</button>
        </div>
      </div>`;
    grid.appendChild(card);
  }
  loadStats();
}

document.getElementById("grid").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-a]");
  if (!btn) return;
  if (btn.dataset.a === "delete" && !confirm("ลบเรื่องนี้ทิ้งถาวร?")) return;
  await fetch(`/api/titles/${btn.dataset.id}/${btn.dataset.a}`, { method: "POST" });
  load();
});

document.querySelectorAll(".tab").forEach(b =>
  b.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    filter = b.dataset.f;
    load();
  })
);

document.getElementById("scrape").addEventListener("click", async () => {
  const btn = document.getElementById("scrape");
  btn.textContent = "Scraping…";
  btn.disabled = true;
  await fetch("/api/scrape", { method: "POST" });
  setTimeout(() => { btn.textContent = "Scrape"; btn.disabled = false; load(); }, 3000);
});

document.getElementById("refresh").addEventListener("click", () => load());

load();
</script>
</body>
</html>
