services:
  log-medic:
    build: .
    container_name: log-medic
    restart: unless-stopped
    mem_limit: 2g
    expose:
      - "5070"
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5070/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - log_medic_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /volume2/docker/log-medic/workspaces:/workspaces
      - /volume2/docker:/stacks

  log-medic-nginx:
    image: nginx:alpine
    container_name: log-medic-nginx
    restart: unless-stopped
    ports:
      - "5070:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      - log-medic

volumes:
  log_medic_data:
