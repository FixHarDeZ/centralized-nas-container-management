version: '3.8'

services:
  maid-tracker:
    build: .
    container_name: maid-tracker
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - maid_tracker_data:/data
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - default

  maid-nginx:
    image: nginx:alpine
    container_name: maid-tracker-nginx
    restart: unless-stopped
    ports:
      - "5055:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      - maid-tracker
    networks:
      - default

volumes:
  maid_tracker_data:

networks:
  default:
    driver: bridge
