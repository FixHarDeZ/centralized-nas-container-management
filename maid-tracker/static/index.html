<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบบันทึกการทำงานแม่บ้าน</title>
  <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1d28" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/static/style.css?v=20260714" />

  <!-- Apply theme BEFORE first paint to avoid flash -->
  <script>
    (function() {
      try {
        var saved = localStorage.getItem("maidTrackerTheme");
        var theme = saved || "light";
        document.documentElement.setAttribute("data-bs-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-bs-theme", "light");
      }
    })();
  </script>
</head>
<body>
  <nav class="navbar sticky-top">
    <div class="container-lg d-flex align-items-center justify-content-between">
      <a class="navbar-brand" id="navBrand" href="#/" onclick="navigate('/')">
        <i class="bi bi-house-heart-fill"></i>
        <span>ระบบบันทึกการทำงานแม่บ้าน</span>
      </a>
      <div class="d-flex gap-2 align-items-center">
        <button id="themeToggle" class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="nav-icon-btn" onclick="navigate('/reminders')" title="Task Reminders" aria-label="Reminders">
          <i class="bi bi-bell-fill"></i>
        </button>
        <button id="langToggle" class="nav-icon-btn" onclick="switchLang()">EN</button>
      </div>
    </div>
  </nav>

  <div id="app" class="container-lg py-4 px-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js?v=20260714"></script>
</body>
</html>
