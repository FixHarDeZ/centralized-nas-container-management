services:
  news-feed:
    build: .
    container_name: news-feed
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - news_feed_data:/data

  nginx:
    image: nginx:alpine
    container_name: news-feed-nginx
    restart: unless-stopped
    ports:
      - "5064:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      - news-feed

volumes:
  news_feed_data:
