services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: secretary-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"        # internal only ไม่ expose ออกนอก
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n:
    image: n8nio/n8n:latest
    container_name: secretary-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
    volumes:
      - n8n_data:/home/node/.n8n

  secretary-query:
    build:
      context: ./query
      dockerfile: Dockerfile
    container_name: secretary-query
    restart: unless-stopped
    ports:
      - "5065:5065"
    env_file:
      - ./query/.env
      - ./ingest/.env
    volumes:
      - hf_cache:/root/.cache/huggingface
      - /volume2/docker/secretary/query-data:/data
      - ./ingest/ingest.py:/ingest/ingest.py:ro
    depends_on:
      - qdrant

  secretary-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: secretary-ingest
    restart: "no"
    env_file: ./ingest/.env
    volumes:
      - ingest_state:/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/qdrant_storage

  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/n8n_data

  ingest_state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/ingest_state

  hf_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/hf_cache