services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: secretary-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"        # internal only ไม่ expose ออกนอก
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: secretary-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - NODE_OPTIONS=--max-old-space-size=1024
    volumes:
      - n8n_data:/home/node/.n8n
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  secretary-query:
    build:
      context: ./query
      dockerfile: Dockerfile
    container_name: secretary-query
    restart: unless-stopped
    ports:
      - "5065:5065"
    env_file:
      - ./query/.env
      - ./ingest/.env
    environment:
      # Cap BGE-M3 / PyTorch thread count so it respects the cpus limit below.
      # Without this, torch reads /proc/cpuinfo (8) and spawns 8 OpenMP threads
      # → CPU saturation on the NAS even though cgroups would throttle anyway.
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - hf_cache:/root/.cache/huggingface
      - /volume2/docker/secretary/query-data:/data
      - ./ingest/ingest.py:/ingest/ingest.py:ro
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          # 6 GB: /ingest-trigger spawns ingest.py as a subprocess in this
          # container (bind mount above), and that subprocess loads its OWN
          # BGE-M3 (~2 GB) on top of the parent's already-resident BGE-M3.
          # At 4 GB the cgroup OOM-killed the subprocess every n8n auto-sync
          # tick (anon-rss ~3.1 GB just for the subprocess, parent ~1-2 GB
          # on top — confirmed via dmesg 2026-06-02 20:01/21:01/22:01/23:02).
          # CPU is controlled at app level via OMP_NUM_THREADS=2 above;
          # Synology DSM kernel lacks CFS scheduler so docker cpus: limits
          # can't be applied.
          memory: 6G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  secretary-ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: secretary-ingest
    restart: "no"
    env_file: ./ingest/.env
    environment:
      - OMP_NUM_THREADS=3
      - MKL_NUM_THREADS=3
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ingest_state:/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          # 6 GB: BGE-M3 + FlagEmbedding holds ~2 GB resident, but encoding a
          # batch of 20–50 chunks (dense + sparse + colbert outputs together)
          # transiently spikes past 4 GB. Confirmed by OOM kill on 2026-06-01
          # while ingesting the User-Password page at the 4 GB ceiling.
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/qdrant_storage

  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/n8n_data

  ingest_state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/ingest_state

  hf_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume2/docker/secretary/hf_cache