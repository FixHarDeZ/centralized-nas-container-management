services:
  torrentwatch:
    build: .
    container_name: torrentwatch
    restart: unless-stopped
    ports:
      - "5059:8000"
    env_file: .env
    environment:
      - TZ=Asia/Bangkok
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - torrentwatch_data:/data
      - ${NAS_TORRENT_PATH}:/downloads

volumes:
  torrentwatch_data:
