<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wallpaper Scout</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <h1>🖼️ Wallpaper Scout</h1>
  <div class="stat" id="total-today">วันนี้ — รูป</div>
</header>

<section class="card form-card">
  <h2 id="form-title">เพิ่ม Topic</h2>
  <form id="topic-form">
    <div class="field grow">
      <label for="query">Query</label>
      <input type="text" id="query" placeholder="เช่น IU, Wuthering Waves" required />
    </div>
    <div class="field grow">
      <label for="search_terms">Search terms (เว้นว่าง = AI คิดให้)</label>
      <input type="text" id="search_terms" placeholder="คั่นด้วย ," />
    </div>
    <div class="field">
      <label>Purpose</label>
      <div class="chips">
        <label class="chip-check"><input type="checkbox" name="purpose" value="mobile" /> Mobile</label>
        <label class="chip-check"><input type="checkbox" name="purpose" value="pc" /> PC</label>
        <label class="chip-check"><input type="checkbox" name="purpose" value="best" /> Best</label>
      </div>
    </div>
    <div class="field">
      <label>Source</label>
      <div class="chips">
        <label class="chip-check"><input type="checkbox" name="source" value="wallhaven" checked /> Wallhaven</label>
        <label class="chip-check"><input type="checkbox" name="source" value="booru" /> Booru (อนิเมะ/เกม)</label>
        <label class="chip-check"><input type="checkbox" name="source" value="reddit" /> Reddit (ไอดอล/คนจริง)</label>
      </div>
    </div>
    <div class="field narrow">
      <label for="frequency">รอบ/วัน</label>
      <input type="number" id="frequency" value="1" min="1" max="24" />
    </div>
    <div class="field narrow">
      <label for="max_new">รูป/รอบ</label>
      <input type="number" id="max_new" value="5" min="1" max="50" />
    </div>
    <div class="field actions">
      <button type="submit" class="primary" id="submit-btn">เพิ่ม Topic</button>
      <button type="button" id="cancel-edit" class="ghost" style="display:none">ยกเลิก</button>
    </div>
  </form>
</section>

<section id="topics" class="topics-grid"></section>

<script src="/app.js"></script>
</body>
</html>
